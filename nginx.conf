# ==============================================================================
# NGINX - API Gateway / Reverse Proxy
# ==============================================================================
#
# ROLE DE NGINX :
#   Nginx est le POINT D'ENTREE unique de l'application.
#   Au lieu que le client appelle directement Spring Boot sur le port 8080,
#   il passe par Nginx sur le port 80.
#
# POURQUOI ?
#   1. SECURITE  : Nginx valide le JWT AVANT de transmettre la requete au backend
#   2. ROUTAGE   : Un seul point d'entree pour tous les services
#   3. DECOUPLAGE: Le client ne connait pas l'adresse reelle du backend
#
# COMMENT CA MARCHE (auth_request) ?
#   1. Le client envoie une requete (ex: GET /api/users) avec un header Authorization
#   2. Nginx intercepte la requete
#   3. Nginx fait une SUBREQUEST interne vers /api/auth/validate (notre Spring Boot)
#   4. Si validate retourne 200 → Nginx transmet la requete au backend
#   5. Si validate retourne 401 → Nginx bloque et retourne 403 au client
#
# FLUX :
#   Client → Nginx (port 80) → auth_request → Spring Boot /api/auth/validate
#                             → si 200 → proxy_pass → Spring Boot (le vrai endpoint)
#                             → si 401 → 403 Forbidden
#
# ROUTES PUBLIQUES (sans auth) :
#   POST /api/auth/register    → inscription
#   POST /api/auth/login       → connexion (recoit le JWT)
#   GET  /api/auth/verify      → verification e-mail
#   GET  /api/auth/validate    → validation JWT (usage interne Nginx)
#   GET  /swagger-ui.html      → documentation Swagger
#   GET  /v3/api-docs          → OpenAPI JSON
#
# ROUTES PROTEGEES (auth requise) :
#   /api/users/*               → CRUD utilisateurs (JWT obligatoire)
#
# ==============================================================================

# Backend Spring Boot (tourne dans Docker sur le port 8080)
# "backend" est le nom du service dans docker-compose.yml
# Docker résout automatiquement "backend" vers l'IP du container
upstream spring_backend {
    server backend:8080;
}

server {
    listen 80;
    server_name localhost;

    # ==================================================================
    # SUBREQUEST D'AUTHENTIFICATION (interne, jamais appele directement)
    # ==================================================================
    # Quand Nginx voit "auth_request /_validate_jwt", il fait une requete
    # interne vers cet endpoint. Il transmet le header Authorization du client.
    # Si Spring Boot retourne 200 → la requete originale est autorisee.
    # Si Spring Boot retourne 401 → Nginx bloque avec 403.
    location = /_validate_jwt {
        internal;  # Accessible UNIQUEMENT par Nginx (pas par le client)

        proxy_pass http://spring_backend/api/auth/validate;
        proxy_method GET;

        # On n'envoie PAS le body de la requete originale (c'est juste une verification)
        proxy_pass_request_body off;
        proxy_set_header Content-Length 0;
        proxy_set_header Content-Type "";
        proxy_set_header Host $host;

        # On transmet le header Authorization du client (contient le JWT)
        proxy_set_header Authorization $http_authorization;

        # Info supplementaire pour le backend (debug)
        proxy_set_header X-Original-URI $request_uri;
    }

    # ==================================================================
    # ROUTES PUBLIQUES (pas de verification JWT)
    # ==================================================================

    # --- Auth endpoints (register, login, verify, validate) ---
    location /api/auth/ {
        proxy_pass http://spring_backend/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Swagger UI ---
    location /swagger-ui.html {
        proxy_pass http://spring_backend/swagger-ui.html;
        proxy_set_header Host $host;
    }

    location /swagger-ui/ {
        proxy_pass http://spring_backend/swagger-ui/;
        proxy_set_header Host $host;
    }

    # --- OpenAPI docs ---
    location /v3/api-docs {
        proxy_pass http://spring_backend/v3/api-docs;
        proxy_set_header Host $host;
    }

    # --- Home ---
    location = / {
        proxy_pass http://spring_backend/;
        proxy_set_header Host $host;
    }

    # ==================================================================
    # ROUTES PROTEGEES (JWT obligatoire via auth_request)
    # ==================================================================

    # --- User management (CRUD) - JWT requis ---
    location /api/users {
        # Subrequest vers /_validate_jwt → verifie le JWT
        # Si retourne 200 → requete autorisee
        # Si retourne 401 → Nginx retourne 401 au client
        auth_request /_validate_jwt;

        # Si la subrequest echoue → retourner du JSON propre
        error_page 401 = @unauthorized;

        # Si la subrequest retourne 200 → on transmet au backend
        proxy_pass http://spring_backend/api/users;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Reponse JSON quand auth_request echoue
    location @unauthorized {
        default_type application/json;
        return 401 '{"error": "Unauthorized", "message": "JWT token is missing or invalid"}';
    }
}