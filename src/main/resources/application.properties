spring.application.name=project

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/project_spring
spring.datasource.username=postgres
spring.datasource.password=dhia
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Execute data.sql after Hibernate schema update (adds missing columns)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
app.secret-key=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
app.expiration-time=900000

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===== RABBITMQ Configuration =====
# RabbitMQ runs in Docker on port 5672
# Admin panel: http://localhost:15672 (guest/guest)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Exchange, routing keys and queues
app.mq.exchange=auth.events
app.mq.rk.user-registered=auth.user-registered
app.mq.rk.email-verified=auth.email-verified
app.mq.queue.user-registered=notification.user-registered
app.mq.queue.user-registered-dlq=notification.user-registered.dlq

# ===== MAILHOG (local SMTP) Configuration =====
# MailHog runs in Docker: SMTP on port 1025, Web UI on http://localhost:8025
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Verification token TTL (in minutes)
app.verification-token.expiration-minutes=30

# Default admin account (created on first startup)
app.admin.username=admin
app.admin.email=admin@admin.com
app.admin.password=Admin@1234

